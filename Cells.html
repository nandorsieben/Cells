        <script>
            "use strict";

            function patchWebGLPrototype(proto) {
                const orig = proto.getContext;
                proto.getContext = function(type, ...args) {
                    if (type === "webgl" || type === "webgl2" || type === "experimental-webgl") {
                        const attribs = args[0] || {};
                        attribs.preserveDrawingBuffer = true;
                        args[0] = attribs;
                    }
                    const ctx = orig.call(this, type, ...args);
                    if (ctx && (type === "webgl" || type === "webgl2" || type === "experimental-webgl")) {
                        this.__webglContext = ctx;
                    }
                    return ctx;
                };
            }

            patchWebGLPrototype(HTMLCanvasElement.prototype);

            (function() {
                function tryPatchIframe(iframe) {
                    try {
                        const win = iframe.contentWindow;
                        if (win && win.HTMLCanvasElement) {
                            patchWebGLPrototype(win.HTMLCanvasElement.prototype);
                        }
                    } catch(e) {}
                }

                const observer = new MutationObserver(mutations => {
                    for (const mutation of mutations) {
                        for (const node of mutation.addedNodes) {
                            if (node.tagName === "IFRAME") {
                                tryPatchIframe(node);
                                node.addEventListener("load", () => tryPatchIframe(node));
                            }
                        }
                    }
                });

                if (document.body) {
                    observer.observe(document.body, { childList: true, subtree: true });
                } else {
                    document.addEventListener("DOMContentLoaded", () => {
                        observer.observe(document.body, { childList: true, subtree: true });
                    });
                }

                document.querySelectorAll("iframe").forEach(iframe => {
                    tryPatchIframe(iframe);
                    iframe.addEventListener("load", () => tryPatchIframe(iframe));
                });
            })();

            let rebuildNumber = 0;
            let cleanupObserver = null;
            const LINK_KEY = "notebook-session";
            const FILENAME_KEY = "sage-notebook-file-name";
            let currentNotebookFileName = localStorage.getItem(FILENAME_KEY) || "sage_notebook.json";

            function updateDocumentTitle() {
                const stem = currentNotebookFileName.replace(/\.json$/i, "");
                document.title = stem;
            }

            function rememberNotebookFileName(name) {
                if (!name) {
                    return;
                }
                currentNotebookFileName = name.toLowerCase().endsWith(".json") ? name : name + ".json";
                localStorage.setItem(FILENAME_KEY, currentNotebookFileName);
                updateDocumentTitle();
            }

            function setStatus(message) {
                const status = document.getElementById("status");
                if (status) {
                    status.textContent = message;
                }
            }

            function getCodeFromCell(cell) {
                const codeMirror = cell.querySelector(".CodeMirror");
                if (codeMirror && codeMirror.CodeMirror) {
                    return codeMirror.CodeMirror.getValue();
                }

                const textarea = cell.querySelector("textarea");
                if (textarea) {
                    return textarea.value;
                }

                const script = cell.querySelector('script[type="text/x-sage"]');
                return script ? script.textContent : "";
            }

            function getAllCellsData() {
                const wrappers = [...document.querySelectorAll("#cells > .cell-wrapper")];
                return wrappers.map(wrapper => {
                    if (wrapper.dataset.type === "markdown") {
                        const textarea = wrapper.querySelector(".markdown-editor");
                        return {
                            type: "markdown",
                            content: textarea ? textarea.value : ""
                        };
                    }

                    const compute = wrapper.querySelector(".compute");
                    return {
                        type: "code",
                        content: compute ? getCodeFromCell(compute) : ""
                    };
                });
            }

            function getCellIndexFromEvent(event) {
                const button = event.target.closest("button[data-action]");
                if (!button) {
                    return -1;
                }

                const wrapper = button.closest(".cell-wrapper");
                return (!wrapper || !wrapper.parentNode) ? -1 : [...wrapper.parentNode.children].indexOf(wrapper);
            }

            function escapeHtml(text) {
                return text
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function renderInlineMarkdown(text) {
                return text
                    .replace(/`([^`]+)`/g, "<code>$1</code>")
                    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
                    .replace(/\*([^*]+)\*/g, "<em>$1</em>");
            }

            function markdownToHtml(markdown) {
                const lines = escapeHtml(markdown).split(/\r?\n/);
                let html = "";
                let list = false;
                let code = false;

                for (const line of lines) {
                    if (line.trim().startsWith("```")) {
                        html += code ? "</code></pre>" : "<pre><code>";
                        code = !code;
                        continue;
                    }

                    if (code) {
                        html += line + "\n";
                        continue;
                    }

                    if (/^###\s+/.test(line)) {
                        if (list) {
                            html += "</ul>";
                            list = false;
                        }
                        html += "<h3>" + renderInlineMarkdown(line.replace(/^###\s+/, "")) + "</h3>";
                        continue;
                    }

                    if (/^##\s+/.test(line)) {
                        if (list) {
                            html += "</ul>";
                            list = false;
                        }
                        html += "<h2>" + renderInlineMarkdown(line.replace(/^##\s+/, "")) + "</h2>";
                        continue;
                    }

                    if (/^#\s+/.test(line)) {
                        if (list) {
                            html += "</ul>";
                            list = false;
                        }
                        html += "<h1>" + renderInlineMarkdown(line.replace(/^#\s+/, "")) + "</h1>";
                        continue;
                    }

                    if (/^[-*]\s+/.test(line)) {
                        if (!list) {
                            html += "<ul>";
                            list = true;
                        }
                        html += "<li>" + renderInlineMarkdown(line.replace(/^[-*]\s+/, "")) + "</li>";
                        continue;
                    }

                    if (line.trim() === "") {
                        if (list) {
                            html += "</ul>";
                            list = false;
                        }
                        continue;
                    }

                    if (list) {
                        html += "</ul>";
                        list = false;
                    }

                    html += "<p>" + renderInlineMarkdown(line) + "</p>";
                }

                if (code) {
                    html += "</code></pre>";
                }

                if (list) {
                    html += "</ul>";
                }

                return html;
            }

            function typesetMath(element) {
                if (window.MathJax && MathJax.typesetPromise) {
                    if (MathJax.typesetClear) {
                        MathJax.typesetClear([element]);
                    }
                    MathJax.typesetPromise([element]).catch(() => {});
                }
            }

            function makeCellToolbar(type) {
                const toolbar = document.createElement("div");
                toolbar.className = "cell-toolbar";

                [
                    ["insert-code-above", "+Sage"],
                    ["insert-markdown-above", "+Md"]
                ].forEach(([action, text]) => {
                    const button = document.createElement("button");
                    button.type = "button";
                    button.dataset.action = action;
                    button.textContent = text;
                    toolbar.appendChild(button);
                });

                if (type === "code") {
                    const run = document.createElement("button");
                    run.type = "button";
                    run.dataset.action = "run-cell";
                    run.textContent = "Run";
                    toolbar.appendChild(run);
                }
                if (type === "markdown") {
                    const preview = document.createElement("button");
                    preview.type = "button";
                    preview.dataset.action = "toggle-markdown-preview";
                    preview.textContent = "Preview";
                    toolbar.appendChild(preview);
                }

                const del = document.createElement("button");
                del.type = "button";
                del.dataset.action = "delete-cell";
                del.textContent = "Delete";
                toolbar.appendChild(del);

                return toolbar;
            }

            function makeCodeCell(content, group) {
                const wrapper = document.createElement("div");
                wrapper.className = "cell-wrapper";
                wrapper.dataset.type = "code";
                wrapper.appendChild(makeCellToolbar("code"));

                const compute = document.createElement("div");
                compute.className = "compute " + group;

                const script = document.createElement("script");
                script.type = "text/x-sage";
                script.textContent = content || "";
                compute.appendChild(script);

                wrapper.appendChild(compute);
                return wrapper;
            }

            function makeMarkdownCell(content) {
                const wrapper = document.createElement("div");
                wrapper.className = "cell-wrapper";
                wrapper.dataset.type = "markdown";
                wrapper.dataset.preview = "false";
                wrapper.appendChild(makeCellToolbar("markdown"));

                const box = document.createElement("div");
                box.className = "markdown-cell";

                const textarea = document.createElement("textarea");
                textarea.className = "markdown-editor";
                textarea.value = content || "";

                const preview = document.createElement("div");
                preview.className = "markdown-preview";
                preview.style.display = "none";

                box.appendChild(textarea);
                box.appendChild(preview);
                wrapper.appendChild(box);
                return wrapper;
            }

            function normalizeCells(cells) {
                if (!Array.isArray(cells) || !cells.length) {
                    return [{ type: "code", content: "" }];
                }

                return cells.map(cell => {
                    if (typeof cell === "string") {
                        return { type: "code", content: cell };
                    }

                    if (cell && cell.type === "markdown") {
                        return { type: "markdown", content: String(cell.content || "") };
                    }

                    if (cell && cell.type === "code") {
                        return { type: "code", content: String(cell.content || "") };
                    }

                    return { type: "code", content: "" };
                });
            }

            function hideSageCellFooters() {
                document.querySelectorAll("#cells .compute a, #cells .compute span, #cells .compute div, #cells .compute p").forEach(element => {
                    if (element.querySelector(".CodeMirror") || element.querySelector("textarea") || element.querySelector("button")) {
                        return;
                    }

                    const text = (element.textContent || "").replace(/\s+/g, " ").trim();
                    if (text === "Help | Powered by SageMath" || text === "Help Powered by SageMath") {
                        element.style.display = "none";
                    }
                });
            }

            function hideFullscreenButtons() {
                const selectors = [
                    ".CodeMirror-fullscreen-button",
                    ".sagecell_fullScreen",
                    ".sagecell_fullscreen",
                    'button[title*="Full"]',
                    'button[title*="full"]',
                    'a[title*="Full"]',
                    'a[title*="full"]'
                ];

                document.querySelectorAll("#cells .compute " + selectors.join(", #cells .compute ")).forEach(element => {
                    element.style.display = "none";
                });

                document.querySelectorAll("#cells .compute button, #cells .compute a").forEach(element => {
                    const text = (element.textContent || "").replace(/\s+/g, " ").trim().toLowerCase();
                    const title = (element.getAttribute("title") || "").toLowerCase();
                    const aria = (element.getAttribute("aria-label") || "").toLowerCase();

                    if (text === "fullscreen" || title.includes("fullscreen") || aria.includes("fullscreen")) {
                        element.style.display = "none";
                    }
                });
            }

            function startCleanupObserver() {
                if (cleanupObserver) {
                    cleanupObserver.disconnect();
                }

                const target = document.getElementById("cells");
                if (!target || !window.MutationObserver) {
                    return;
                }

                cleanupObserver = new MutationObserver(() => {
                    hideSageCellFooters();
                    hideFullscreenButtons();
                });
                cleanupObserver.observe(target, { childList: true, subtree: true });
            }

            function rebuildCells(data, message) {
                const holder = document.getElementById("cells");
                if (!holder) {
                    return;
                }

                const cells = normalizeCells(data);
                const group = "sage-linked-group-" + (++rebuildNumber);
                holder.innerHTML = "";

                cells.forEach(cell => {
                    holder.appendChild(cell.type === "markdown" ? makeMarkdownCell(cell.content) : makeCodeCell(cell.content, group));
                });

                if (cells.some(cell => cell.type === "code")) {
                    if (!window.sagecell || typeof sagecell.makeSagecell !== "function") {
                        setStatus("SageCell did not load. Check your internet connection or browser console.");
                        return;
                    }

                    sagecell.makeSagecell({
                        inputLocation: "." + group,
                        linked: true,
                        linkKey: LINK_KEY,
                        evalButtonText: "Run",
                        autoeval: false
                    });

                    startCleanupObserver();
                    setTimeout(() => {
                        hideSageCellFooters();
                        hideFullscreenButtons();
                    }, 500);
                    setTimeout(() => {
                        hideSageCellFooters();
                        hideFullscreenButtons();
                    }, 1500);
                }

                setStatus(message || "Ready.");
            }

            /* ---------- incremental helpers (no session reset) ---------- */

            function initSingleCodeCell(compute) {
                if (!window.sagecell || typeof sagecell.makeSagecell !== "function") {
                    setStatus("SageCell did not load.");
                    return;
                }
                const uniqueClass = "sage-cell-" + (++rebuildNumber);
                compute.classList.add(uniqueClass);
                sagecell.makeSagecell({
                    inputLocation: "." + uniqueClass,
                    linked: true,
                    linkKey: LINK_KEY,
                    evalButtonText: "Run",
                    autoeval: false
                });
                startCleanupObserver();
                setTimeout(() => {
                    hideSageCellFooters();
                    hideFullscreenButtons();
                }, 500);
                setTimeout(() => {
                    hideSageCellFooters();
                    hideFullscreenButtons();
                }, 1500);
            }

            function addCell() {
                const holder = document.getElementById("cells");
                const cell = makeCodeCell("", "");
                holder.appendChild(cell);
                initSingleCodeCell(cell.querySelector(".compute"));
                setStatus("Added a Sage cell.");
            }

            function addMarkdownCell() {
                const holder = document.getElementById("cells");
                const cell = makeMarkdownCell("");
                holder.appendChild(cell);
                setStatus("Added a Markdown cell.");
            }

            function insertCellAbove(event, type) {
                const index = getCellIndexFromEvent(event);
                if (index < 0) {
                    return;
                }

                const holder = document.getElementById("cells");
                const wrappers = [...holder.children];
                const refWrapper = wrappers[index];

                const newWrapper = type === "code"
                    ? makeCodeCell("", "")
                    : makeMarkdownCell("");

                holder.insertBefore(newWrapper, refWrapper);

                if (type === "code") {
                    initSingleCodeCell(newWrapper.querySelector(".compute"));
                }

                setStatus("Inserted a " + (type === "code" ? "Sage" : "Markdown") + " cell above.");
            }

            function deleteCell(event) {
                const index = getCellIndexFromEvent(event);
                if (index < 0) {
                    return;
                }

                const holder = document.getElementById("cells");
                const wrappers = [...holder.children];

                if (wrappers.length > 1) {
                    wrappers[index].remove();
                    setStatus("Deleted a cell.");
                } else {
                    const newWrapper = makeCodeCell("", "");
                    holder.replaceChild(newWrapper, wrappers[0]);
                    initSingleCodeCell(newWrapper.querySelector(".compute"));
                    setStatus("Cleared the last cell.");
                }
            }

            /* ---------- end incremental helpers ---------- */

            async function previewAllMarkdownCells() {
                const previews = [];

                document.querySelectorAll('#cells > .cell-wrapper[data-type="markdown"]').forEach(wrapper => {
                    const textarea = wrapper.querySelector(".markdown-editor");
                    const preview = wrapper.querySelector(".markdown-preview");
                    const button = wrapper.querySelector('button[data-action="toggle-markdown-preview"]');

                    if (!textarea || !preview) {
                        return;
                    }

                    preview.innerHTML = markdownToHtml(textarea.value);
                    textarea.style.display = "none";
                    preview.style.display = "block";
                    wrapper.dataset.preview = "true";

                    if (button) {
                        button.textContent = "Edit";
                    }

                    previews.push(preview);
                });

                if (window.MathJax && MathJax.typesetPromise && previews.length) {
                    if (MathJax.typesetClear) {
                        MathJax.typesetClear(previews);
                    }
                    await MathJax.typesetPromise(previews).catch(() => {});
                }

                return previews;
            }

            async function runAllCells() {
                await previewAllMarkdownCells();

                if (window.jQuery) {
                    window.jQuery("#cells .sagecell_evalButton").click();
                } else {
                    document.querySelectorAll("#cells .sagecell_evalButton").forEach(button => button.click());
                }

                setStatus("Running all code cells and previewing Markdown cells...");
                setTimeout(() => {
                    hideSageCellFooters();
                    hideFullscreenButtons();
                }, 1000);
            }

            function runCell(event) {
                const wrapper = event.target.closest(".cell-wrapper");
                if (!wrapper) {
                    return;
                }
                const runButton = wrapper.querySelector(".compute .sagecell_evalButton");
                if (runButton) {
                    runButton.click();
                    setStatus("Running cell...");
                } else {
                    setStatus("Run button is not ready yet. Please wait for SageCell to finish loading.");
                }
                setTimeout(() => {
                    hideSageCellFooters();
                    hideFullscreenButtons();
                }, 1000);
            }
            function toggleMarkdownPreview(event) {
                const wrapper = event.target.closest(".cell-wrapper");
                if (!wrapper) {
                    return;
                }

                const textarea = wrapper.querySelector(".markdown-editor");
                const preview = wrapper.querySelector(".markdown-preview");
                const button = event.target.closest("button");

                if (wrapper.dataset.preview === "true") {
                    textarea.style.display = "block";
                    preview.style.display = "none";
                    wrapper.dataset.preview = "false";
                    button.textContent = "Preview";
                } else {
                    preview.innerHTML = markdownToHtml(textarea.value);
                    textarea.style.display = "none";
                    preview.style.display = "block";
                    wrapper.dataset.preview = "true";
                    button.textContent = "Edit";
                    typesetMath(preview);
                }
            }

            function captureCanvasDataUrl(canvas) {
                let ctx = canvas.__webglContext;
                if (!ctx) {
                    try { ctx = canvas.getContext('webgl') || canvas.getContext('webgl2'); } catch(e) {}
                }
                if (ctx) {
                    try {
                        const w = canvas.width;
                        const h = canvas.height;
                        if (w > 0 && h > 0) {
                            const pixels = new Uint8Array(w * h * 4);
                            ctx.readPixels(0, 0, w, h, ctx.RGBA, ctx.UNSIGNED_BYTE, pixels);
                            const temp = document.createElement("canvas");
                            temp.width = w;
                            temp.height = h;
                            const tctx = temp.getContext("2d");
                            tctx.fillStyle = "white";
                            tctx.fillRect(0, 0, w, h);
                            const imageData = tctx.createImageData(w, h);
                            for (let y = 0; y < h; y++) {
                                for (let x = 0; x < w; x++) {
                                    const si = (y * w + x) * 4;
                                    const di = ((h - 1 - y) * w + x) * 4;
                                    imageData.data[di] = pixels[si];
                                    imageData.data[di + 1] = pixels[si + 1];
                                    imageData.data[di + 2] = pixels[si + 2];
                                    imageData.data[di + 3] = 255;
                                }
                            }
                            tctx.putImageData(imageData, 0, 0);
                            const url = temp.toDataURL("image/png");
                            if (url && url.length > 100) return url;
                        }
                    } catch(e) {}
                    return null;
                }

                try {
                    const url = canvas.toDataURL("image/png");
                    if (url && url.length > 100 && url !== "data:,") return url;
                } catch(e) {}
                return null;
            }

            function makePlaceholderImg(width, height) {
                const c = document.createElement("canvas");
                c.width = Math.max(width, 200);
                c.height = Math.max(height, 50);
                const ctx = c.getContext("2d");
                ctx.fillStyle = "#f0f0f0";
                ctx.fillRect(0, 0, c.width, c.height);
                ctx.strokeStyle = "#999";
                ctx.lineWidth = 1.5;
                ctx.strokeRect(3, 3, c.width - 6, c.height - 6);
                ctx.fillStyle = "#666";
                ctx.font = "14px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("3D Plot (interactive viewer not available in PDF)", c.width / 2, c.height / 2);
                return c.toDataURL("image/png");
            }

            function extractPlotCall(code) {
                const start = code.indexOf("implicit_plot3d(");
                if (start < 0) return null;
                let depth = 1;
                let i = start + "implicit_plot3d(".length;
                while (i < code.length && depth > 0) {
                    if (code[i] === '(') depth++;
                    else if (code[i] === ')') depth--;
                    i++;
                }
                return code.substring(start, i);
            }

            function getBase64PlotForCode(originalCode) {
                return new Promise(resolve => {
                    const call = extractPlotCall(originalCode);
                    if (!call) { resolve(null); return; }

                    const container = document.createElement("div");
                    container.style.cssText = "position:absolute;left:-9999px;top:0;width:1px;height:1px;overflow:hidden";
                    document.body.appendChild(container);

                    const compute = document.createElement("div");
                    compute.className = "compute";
                    const script = document.createElement("script");
                    script.type = "text/x-sage";
                    script.textContent = [
                        "import base64, tempfile, os",
                        "__p = " + call,
                        '__f = tempfile.NamedTemporaryFile(suffix=".png", delete=False)',
                        "__p.save(__f.name)",
                        "__f.close()",
                        "with open(__f.name, 'rb') as __fh:",
                        "    print('PLOT_DATA:' + base64.b64encode(__fh.read()).decode())",
                        "os.unlink(__f.name)",
                        "del __p, __f, __fh"
                    ].join("\n");
                    compute.appendChild(script);
                    container.appendChild(compute);

                    const tempClass = "temp-plot-" + Date.now() + "-" + Math.random().toString(36).slice(2, 7);
                    compute.classList.add(tempClass);
                    sagecell.makeSagecell({
                        inputLocation: "." + tempClass,
                        linked: true,
                        linkKey: LINK_KEY,
                        evalButtonText: "Run",
                        autoeval: false
                    });

                    setTimeout(() => {
                        const btn = compute.querySelector(".sagecell_evalButton");
                        if (btn) btn.click();

                        let attempts = 0;
                        const check = setInterval(() => {
                            attempts++;
                            const stdout = compute.querySelector(".sagecell_stdout");
                            if (stdout && stdout.textContent) {
                                const text = stdout.textContent;
                                const idx = text.indexOf("PLOT_DATA:");
                                if (idx >= 0) {
                                    const b64 = text.substring(idx + 10).replace(/[\s\r\n]+/g, "").trim();
                                    if (b64.length > 50) {
                                        clearInterval(check);
                                        if (document.body.contains(container)) document.body.removeChild(container);
                                        resolve("data:image/png;base64," + b64);
                                        return;
                                    }
                                }
                            }
                            if (attempts >= 75) {
                                clearInterval(check);
                                if (document.body.contains(container)) document.body.removeChild(container);
                                resolve(null);
                            }
                        }, 200);
                    }, 1500);
                });
            }

            function snapshotCanvasesForPrint() {
                const replaceCanvas = function(canvas) {
                    if (canvas.width === 0 || canvas.height === 0) return;
                    try {
                        const dataUrl = captureCanvasDataUrl(canvas);
                        if (!dataUrl) return;
                        const img = document.createElement("img");
                        img.src = dataUrl;
                        img.dataset.pdfSnapshot = "true";
                        img.style.display = "block";
                        img.style.maxWidth = "100%";
                        img.style.height = "auto";

                        canvas.parentNode.insertBefore(img, canvas);
                        canvas.dataset.pdfHidden = "true";
                        canvas.style.display = "none";
                    } catch(e) {}
                };

                document.querySelectorAll("#cells .compute canvas").forEach(replaceCanvas);

                document.querySelectorAll("#cells .compute iframe").forEach(iframe => {
                    let captured = false;
                    try {
                        const doc = iframe.contentDocument || iframe.contentWindow.document;
                        doc.querySelectorAll("canvas").forEach(replaceCanvas);
                        captured = true;
                    } catch(e) {}
                    if (!captured) {
                        const w = iframe.offsetWidth || 500;
                        const h = iframe.offsetHeight || 300;
                        let dataUrl;
                        if (iframe.dataset.plotDataUrl) {
                            dataUrl = iframe.dataset.plotDataUrl;
                        } else {
                            dataUrl = makePlaceholderImg(w, h);
                        }
                        const img = document.createElement("img");
                        img.src = dataUrl;
                        img.dataset.pdfSnapshot = "true";
                        img.style.cssText = "display:block;width:100%;height:355px;object-fit:cover;";
                        iframe.parentNode.insertBefore(img, iframe);
                        iframe.dataset.pdfHidden = "true";
                        iframe.style.display = "none";
                    }
                });
            }

            function restoreCanvasesAfterPrint() {
                document.querySelectorAll('[data-pdf-snapshot="true"]').forEach(img => img.remove());
                document.querySelectorAll('[data-pdf-hidden]').forEach(c => c.style.display = "");
                document.querySelectorAll('[data-pdf-code="true"]').forEach(pre => pre.remove());
                document.querySelectorAll("#cells .compute .CodeMirror").forEach(cm => {
                    if (cm.style.display === "none") cm.style.display = "";
                });
            }

            window.addEventListener("afterprint", restoreCanvasesAfterPrint);

            async function createPdf() {
                setStatus("Typesetting Markdown math for PDF...");
                await previewAllMarkdownCells();
                hideSageCellFooters();
                hideFullscreenButtons();

                if (document.fonts && document.fonts.ready) {
                    await document.fonts.ready.catch(() => {});
                }

                const plotPromises = [];
                document.querySelectorAll("#cells .compute iframe").forEach(iframe => {
                    try {
                        const doc = iframe.contentDocument || iframe.contentWindow.document;
                        doc; // if accessible, skip
                    } catch(e) {
                        const compute = iframe.closest(".compute");
                        if (compute) {
                            const code = getCodeFromCell(compute);
                            if (code && code.includes("implicit_plot3d(")) {
                                const promise = getBase64PlotForCode(code).then(url => {
                                    if (url) { iframe.dataset.plotDataUrl = url; }
                                });
                                plotPromises.push(promise);
                            }
                        }
                    }
                });

                if (plotPromises.length) {
                    setStatus("Generating static PNG of 3D plot in kernel (" + plotPromises.length + " cell(s))...");
                    await Promise.all(plotPromises);
                }

                await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

                const mainCanvases = document.querySelectorAll("#cells .compute canvas").length;
                const iframes = document.querySelectorAll("#cells .compute iframe").length;
                let iframeCanvases = 0;
                document.querySelectorAll("#cells .compute iframe").forEach(iframe => {
                    try {
                        const doc = iframe.contentDocument || iframe.contentWindow.document;
                        iframeCanvases += doc.querySelectorAll("canvas").length;
                    } catch(e) {}
                });

                snapshotCanvasesForPrint();

                const snapshotImgs = document.querySelectorAll('[data-pdf-snapshot="true"]').length;

                document.querySelectorAll("#cells .compute .CodeMirror, #cells .compute .CodeMirror-scroll, #cells .compute .CodeMirror-sizer, #cells .compute .sagecell").forEach(el => {
                    el.style.height = "";
                    el.style.minHeight = "";
                    el.style.maxHeight = "";
                });

                document.querySelectorAll("#cells .compute .CodeMirror").forEach(cm => {
                    if (!cm.CodeMirror) return;
                    const code = cm.CodeMirror.getValue();
                    const lines = code.split('\n');
                    const numbered = lines.map((line, i) => {
                        const num = (i + 1).toString().padStart(Math.max(2, String(lines.length).length), ' ');
                        return num + ': ' + line;
                    }).join('\n');
                    const pre = document.createElement("pre");
                    pre.textContent = numbered;
                    pre.dataset.pdfCode = "true";
                    pre.style.cssText = "margin:0;padding:3px 4px;font-family:monospace;font-size:9pt;line-height:1;white-space:pre-wrap;word-wrap:break-word;color:#000;background:#fff;border:none;";
                    cm.parentNode.insertBefore(pre, cm);
                    cm.style.display = "none";
                });

                await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
                setStatus("Canvases: " + mainCanvases + " main, " + iframeCanvases + " in "+iframes+" iframe(s). Snapshots: " + snapshotImgs + ". Preparing print.");
                setTimeout(() => window.print(), 500);
            }

            async function saveCells() {
                const json = JSON.stringify(getAllCellsData(), null, 2);

                if (window.showSaveFilePicker) {
                    try {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: currentNotebookFileName,
                            types: [{
                                description: "JSON notebook",
                                accept: { "application/json": [".json"] }
                            }]
                        });
                        rememberNotebookFileName(handle.name);
                        const writable = await handle.createWritable();
                        await writable.write(json);
                        await writable.close();
                        setStatus("Saved " + currentNotebookFileName + ".");
                        return;
                    } catch (error) {
                        setStatus("Save cancelled.");
                        return;
                    }
                }

                const blob = new Blob([json], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = currentNotebookFileName;
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(url);
                setStatus("Downloaded " + currentNotebookFileName + ".");
            }

            function loadCellsFromFile(event) {
                const file = event.target.files[0];
                event.target.value = "";

                if (!file) {
                    return;
                }

                rememberNotebookFileName(file.name);
                const reader = new FileReader();
                reader.onload = loadEvent => {
                    try {
                        rebuildCells(normalizeCells(JSON.parse(loadEvent.target.result)), "Loaded notebook. The Sage session was reset. Run cells from top to bottom.");
                    } catch (error) {
                        setStatus("Load failed: " + error.message);
                    }
                };
                reader.readAsText(file);
            }

            window.addEventListener("load", () => {
                document.getElementById("add-cell").addEventListener("click", addCell);
                document.getElementById("add-markdown-cell").addEventListener("click", addMarkdownCell);
                document.getElementById("run-all").addEventListener("click", runAllCells);
                document.getElementById("create-pdf").addEventListener("click", createPdf);
                document.getElementById("save-cells").addEventListener("click", saveCells);
                document.getElementById("load-file").addEventListener("change", loadCellsFromFile);

                document.getElementById("cells").addEventListener("click", event => {
                    const button = event.target.closest("button[data-action]");
                    if (!button) {
                        return;
                    }

                    if (button.dataset.action === "insert-code-above") {
                        insertCellAbove(event, "code");
                    }
                    if (button.dataset.action === "insert-markdown-above") {
                        insertCellAbove(event, "markdown");
                    }
                    if (button.dataset.action === "run-cell") {
                        runCell(event);
                    }
                    if (button.dataset.action === "delete-cell") {
                        deleteCell(event);
                    }
                    if (button.dataset.action === "toggle-markdown-preview") {
                        toggleMarkdownPreview(event);
                    }
                });

                updateDocumentTitle();
                rebuildCells(getAllCellsData(), "Ready.");
            });
        </script>
    <base target="_blank">
</head>
    <body>
        <div class="toolbar">
            <button type="button" id="run-all">Run All</button>
            <button type="button" id="create-pdf">Create PDF</button>
            <button type="button" id="save-cells">Save</button>
            <label for="load-file">Load</label>
            <input id="load-file" type="file" accept="application/json,.json">
            <span id="status">Loading SageCell...</span>
        </div>

        <div id="cells">
            <div class="cell-wrapper" data-type="code">
                <div class="compute">
                    <script type="text/x-sage"></script>
                </div>
            </div>
            <div class="cell-wrapper" data-type="markdown" data-preview="false">
                <div class="markdown-cell">
                    <textarea class="markdown-editor"></textarea>
                    <div class="markdown-preview" style="display:none;"></div>
                </div>
            </div>
        </div>

        <div class="toolbar bottom-toolbar">
            <button type="button" id="add-cell">+Sage</button>
            <button type="button" id="add-markdown-cell">+Md</button>
        </div>
    </body>
</html>
